<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .form-wrap {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 2rem;
    }

    .form-title {
      font-size: 22px;
      font-weight: 600;
      color: #111;
      margin-bottom: 0.25rem;
    }

    .form-sub {
      font-size: 14px;
      color: #777;
      margin-bottom: 1.75rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
      color: #111;
      background: #fff;
    }

    .field input:focus {
      border-color: #555;
    }

    .field input::placeholder {
      color: #bbb;
    }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .field-row label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
    }

    .forgot-link {
      font-size: 12px;
      color: #777;
      text-decoration: underline;
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      margin-top: 1.25rem;
      padding: 10px;
      font-size: 15px;
      font-weight: 500;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .submit-btn:hover { opacity: 0.85; }

    .submit-btn:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .message {
      display: none;
      margin-top: 1rem;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
    }

    .message.error {
      display: block;
      color: #8a1f1f;
      background: #fdecec;
      border: 1px solid #f6caca;
    }

    .divider {
      text-align: center;
      font-size: 13px;
      color: #bbb;
      margin: 1.25rem 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #eee;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .signup-link {
      text-align: center;
      font-size: 13px;
      color: #777;
      margin-top: 1rem;
    }

    .signup-link a {
      color: #111;
      text-decoration: underline;
    }

    #success {
      display: none;
      text-align: center;
      padding: 2rem 1rem;
    }

    #success .check {
      font-size: 48px;
      color: #2e7d32;
      margin-bottom: 0.75rem;
    }

    #success .success-title {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 0.5rem;
    }

    #success p {
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="form-wrap">

    <div id="form-view">
      <h1 class="form-title">Welcome back</h1>
      <p class="form-sub">Log in to your account to continue.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="jane@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a class="forgot-link" href="#">Forgot password?</a>
        </div>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      <button class="submit-btn" id="submit-btn" onclick="handleLogin()">Log in</button>
      <div class="message" id="message" role="alert"></div>

      <div class="divider">or</div>

      <p class="signup-link">Don't have an account? <a href="signup_form.html">Sign up</a></p>
    </div>

    <div id="success">
      <div class="check"><i class="ti ti-circle-check"></i></div>
      <p class="success-title">You're logged in!</p>
      <p>Welcome back. Redirecting you now...</p>
    </div>

  </div>

  <script>
    const API_BASE = window.location.origin.startsWith('http')
      ? window.location.origin
      : 'http://localhost:5000';

    function showError(text) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = 'message error';
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const button = document.getElementById('submit-btn');
      const message = document.getElementById('message');

      message.textContent = '';
      message.className = 'message';

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }
      if (!email.includes('@')) {
        showError('Please enter a valid email address.');
        return;
      }
      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      button.disabled = true;
      button.textContent = 'Logging in...';

      try {
        const response = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

        localStorage.setItem('chief_token', data.token);
        localStorage.setItem('chief_user', JSON.stringify(data.user));

        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success').style.display = 'block';

        setTimeout(() => {
          window.location.href = 'ndex.html';
        }, 1000);
      } catch (err) {
        showError(err.message || 'Could not log in. Please try again.');
      } finally {
        button.disabled = false;
        button.textContent = 'Log in';
      }
    }
  </script>

</body>
</html>
